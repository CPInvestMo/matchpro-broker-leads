<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MatchPro - Broker Leads System</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    header {
      background: white;
      padding: 30px;
      border-radius: 12px;
      margin-bottom: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    
    h1 {
      color: #1f4e78;
      margin-bottom: 10px;
      font-size: 28px;
    }
    
    .subtitle {
      color: #666;
      font-size: 14px;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .stat-card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    
    .stat-card h3 {
      color: #666;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
      text-transform: uppercase;
    }
    
    .stat-card .value {
      font-size: 32px;
      font-weight: bold;
      color: #1f4e78;
    }
    
    .leads-table {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
    }
    
    thead {
      background: #1f4e78;
      color: white;
    }
    
    th {
      padding: 15px;
      text-align: left;
      font-weight: 600;
      font-size: 14px;
    }
    
    td {
      padding: 15px;
      border-bottom: 1px solid #eee;
    }
    
    tr:hover {
      background: #f9f9f9;
    }
    
    .phone {
      color: #667eea;
      font-weight: 600;
      cursor: pointer;
    }
    
    .phone:hover {
      text-decoration: underline;
    }
    
    .status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .status.new {
      background: #e3f2fd;
      color: #1976d2;
    }
    
    .status.contacted {
      background: #fff3e0;
      color: #f57c00;
    }
    
    .status.matched {
      background: #e8f5e9;
      color: #388e3c;
    }
    
    .confidence {
      font-weight: 600;
      color: #1f4e78;
    }
    
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    
    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }
    
    button:hover {
      background: #764ba2;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: white;
    }
    
    .last-update {
      color: #999;
      font-size: 12px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🏠 MatchPro - Broker Leads System</h1>
      <p class="subtitle">Real estate leads updated every 12 hours • All phone numbers visible</p>
      <div class="last-update" id="lastUpdate"></div>
    </header>
    
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card">
        <h3>Active Leads</h3>
        <div class="value" id="activeLeads">-</div>
      </div>
      <div class="stat-card">
        <h3>Total Matches</h3>
        <div class="value" id="totalMatches">-</div>
      </div>
      <div class="stat-card">
        <h3>Closed Deals</h3>
        <div class="value" id="closedDeals">-</div>
      </div>
      <div class="stat-card">
        <h3>Pending Contacts</h3>
        <div class="value" id="pendingContacts">-</div>
      </div>
    </div>
    
    <div class="controls">
      <button onclick="refreshLeads()">🔄 Refresh Now</button>
      <button onclick="exportToExcel()">📥 Export to Excel</button>
    </div>
    
    <div class="leads-table">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Match ID</th>
            <th>Confidence</th>
            <th>Buyer</th>
            <th>Buyer Phone</th>
            <th>Seller</th>
            <th>Seller Phone</th>
            <th>Property</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="leadsBody">
          <tr>
            <td colspan="9" style="text-align: center; padding: 40px;">Loading leads...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
  
  <script>
    async function loadLeads() {
      try {
        const response = await fetch('/api/leads');
        const data = await response.json();
        
        // Update stats
        document.getElementById('activeLeads').textContent = data.brokerStats.activeLeads || 0;
        document.getElementById('totalMatches').textContent = data.totalMatches || 0;
        document.getElementById('closedDeals').textContent = data.brokerStats.closedDeals || 0;
        document.getElementById('pendingContacts').textContent = data.brokerStats.pendingContacts || 0;
        document.getElementById('lastUpdate').textContent = `Last updated: ${new Date(data.lastUpdate).toLocaleString()}`;
        
        // Update table
        const tbody = document.getElementById('leadsBody');
        tbody.innerHTML = '';
        
        data.leads.forEach((lead, index) => {
          const row = tbody.insertRow();
          row.innerHTML = `
            <td>${index + 1}</td>
            <td>${lead.matchId}</td>
            <td><span class="confidence">${lead.confidence}%</span></td>
            <td>${lead.buyer.name}</td>
            <td><span class="phone" onclick="copyPhone('${lead.buyer.phone}')">${lead.buyer.phone}</span></td>
            <td>${lead.seller.name}</td>
            <td><span class="phone" onclick="copyPhone('${lead.seller.phone}')">${lead.seller.phone}</span></td>
            <td>${lead.property}</td>
            <td><span class="status ${lead.status}">${lead.status}</span></td>
          `;
        });
      } catch (error) {
        console.error('Error loading leads:', error);
        document.getElementById('leadsBody').innerHTML = '<tr><td colspan="9" style="text-align: center; color: red;">Error loading leads</td></tr>';
      }
    }
    
    function refreshLeads() {
      loadLeads();
    }
    
    async function exportToExcel() {
      window.location.href = '/api/leads/export';
    }
    
    function copyPhone(phone) {
      navigator.clipboard.writeText(phone);
      alert('Phone copied: ' + phone);
    }
    
    // Load leads on page load
    loadLeads();
    
    // Auto-refresh every 5 minutes
    setInterval(loadLeads, 5 * 60 * 1000);
  </script>
</body>
</html>
